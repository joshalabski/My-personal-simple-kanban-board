<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal kanban board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <h1>Simple Kanban Board</h1>
     
    <div class="board">
      <!--LIST 1-->
      <div class="list" id="todo">
          <h2>To-Do</h2>
        <div class="tasks"></div>
      </div>

    

      <!--LIST 2-->
      <div class="list" id="progress">
          <h2>In Progress</h2>
        <div class="tasks">
          
        </div>
      </div>

      <!--LIST 3-->
      <div class="list" id="done">
          <h2>Done</h2>
        <div class="tasks"></div>
      </div>

    </div>


     <button class="add">
      Add Task!
    </button>


  </div>

  <script src="script.js"></script>
</body>
</html>
